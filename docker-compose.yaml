services:
  # ──────────────────────────────────────────────
  # Companion application database (PostgreSQL)
  # ──────────────────────────────────────────────
  companion-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: companion
      POSTGRES_USER: companion
      POSTGRES_PASSWORD: companion
    ports:
      - "5432:5432"
    volumes:
      - companion-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U companion"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # ESE Database — PostgreSQL
  # ──────────────────────────────────────────────
  ese-postgresql:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hivemq_ese
      POSTGRES_USER: ese
      POSTGRES_PASSWORD: ese
    ports:
      - "5433:5432"
    volumes:
      - ese-pg-data:/var/lib/postgresql/data
      - ./references/postgresql_create.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./references/insert/default_permissions_insert.sql:/docker-entrypoint-initdb.d/02-permissions.sql
      - ./references/insert/default_roles_insert.sql:/docker-entrypoint-initdb.d/03-roles.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ese"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # ESE Database — MySQL
  # ──────────────────────────────────────────────
  ese-mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hivemq_ese
      MYSQL_USER: ese
      MYSQL_PASSWORD: ese
    ports:
      - "3306:3306"
    volumes:
      - ese-mysql-data:/var/lib/mysql
      - ./references/mysql_create.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./references/insert/default_permissions_insert.sql:/docker-entrypoint-initdb.d/02-permissions.sql
      - ./references/insert/default_roles_insert.sql:/docker-entrypoint-initdb.d/03-roles.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "ese", "-pese"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ──────────────────────────────────────────────
  # ESE Database — SQL Server
  # NOTE: Azure SQL Edge is used for local dev on ARM (Apple Silicon).
  # For production on x86, use mcr.microsoft.com/mssql/server:2022-latest
  # ──────────────────────────────────────────────
  ese-mssql:
    image: mcr.microsoft.com/azure-sql-edge:latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Ese_Comp@nion_2026!"
    ports:
      - "1433:1433"
    volumes:
      - ese-mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost',1433)); s.close()\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Init container to load SQL Server schema (run once after ese-mssql is healthy)
  ese-mssql-init:
    image: mcr.microsoft.com/mssql-tools:latest
    depends_on:
      ese-mssql:
        condition: service_healthy
    volumes:
      - ./references/mssql_create.sql:/init/01-schema.sql
      - ./references/insert/default_permissions_insert.sql:/init/02-permissions.sql
      - ./references/insert/default_roles_insert.sql:/init/03-roles.sql
    entrypoint: /bin/bash
    command: >
      -c "
      echo 'Creating database...' &&
      /opt/mssql-tools/bin/sqlcmd -S ese-mssql -U sa -P 'Ese_Comp@nion_2026!' -C -Q \"IF NOT EXISTS (SELECT * FROM sys.databases WHERE name='hivemq_ese') CREATE DATABASE hivemq_ese;\" &&
      echo 'Loading schema...' &&
      /opt/mssql-tools/bin/sqlcmd -S ese-mssql -U sa -P 'Ese_Comp@nion_2026!' -C -d hivemq_ese -i /init/01-schema.sql &&
      echo 'Loading permissions...' &&
      /opt/mssql-tools/bin/sqlcmd -S ese-mssql -U sa -P 'Ese_Comp@nion_2026!' -C -d hivemq_ese -i /init/02-permissions.sql &&
      echo 'Loading roles...' &&
      /opt/mssql-tools/bin/sqlcmd -S ese-mssql -U sa -P 'Ese_Comp@nion_2026!' -C -d hivemq_ese -i /init/03-roles.sql &&
      echo 'SQL Server initialization complete.'
      "

volumes:
  companion-data:
  ese-pg-data:
  ese-mysql-data:
  ese-mssql-data:
