name: Publish Helm Chart

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write

jobs:
  publish:
    name: Package and Publish Helm Chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          VERSION="${TAG_NAME#v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Update Chart version and appVersion
        env:
          CHART_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          sed -i "s/^version:.*/version: ${CHART_VERSION}/" helm/ese-companion/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${CHART_VERSION}\"/" helm/ese-companion/Chart.yaml
          cat helm/ese-companion/Chart.yaml

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package Helm chart
        run: |
          mkdir -p .helm-packages
          helm package helm/ese-companion -d .helm-packages

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Update Helm repository index
        run: |
          cp .helm-packages/*.tgz gh-pages/
          helm repo index gh-pages --url https://anthonyolazabal.github.io/ese-companion

      - name: Push to gh-pages
        env:
          CHART_VERSION: ${{ steps.version.outputs.VERSION }}
        working-directory: gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Publish Helm chart ${CHART_VERSION}"
          git push
