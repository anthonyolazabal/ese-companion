name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  DOCKER_IMAGE: anthonyolazabal/ese-companion

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Backend tests
        working-directory: backend
        run: ./gradlew test

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable pnpm
        run: corepack enable

      - name: Frontend tests
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm test

  build-and-release:
    name: Build, Push & Release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          echo "VERSION=${TAG_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.VERSION }}
            ${{ env.DOCKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          TAG_NAME: ${{ github.ref_name }}
          IMAGE: ${{ env.DOCKER_IMAGE }}
        uses: softprops/action-gh-release@v2
        with:
          name: "ESE Companion ${{ github.ref_name }}"
          generate_release_notes: true
          body: |
            ## Docker Image

            ```bash
            docker pull anthonyolazabal/ese-companion:${{ steps.version.outputs.VERSION }}
            ```

            ## Helm

            ```bash
            helm install ese-companion ./helm/ese-companion \
              --set image.tag=${{ steps.version.outputs.VERSION }}
            ```

            See [Release Notes](docs/RELEASE-NOTES-v2.0.md) for full details.
