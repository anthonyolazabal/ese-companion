apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ese-companion.fullname" . }}
  labels:
    {{- include "ese-companion.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "ese-companion.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ese-companion.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "ese-companion.serviceAccountName" . }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.httpPort }}
              protocol: TCP
            {{- if .Values.https.enabled }}
            - name: https
              containerPort: {{ .Values.service.httpsPort }}
              protocol: TCP
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "ese-companion.fullname" . }}
            - secretRef:
                {{- if .Values.security.existingSecret }}
                name: {{ .Values.security.existingSecret }}
                {{- else }}
                name: {{ include "ese-companion.fullname" . }}
                {{- end }}
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.https.enabled }}
          volumeMounts:
            - name: jks-volume
              mountPath: /app/certs
              readOnly: true
          {{- end }}
      {{- if .Values.https.enabled }}
      volumes:
        - name: jks-volume
          secret:
            {{- if .Values.https.existingSecret }}
            secretName: {{ .Values.https.existingSecret }}
            {{- else }}
            secretName: {{ include "ese-companion.fullname" . }}-jks
            {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
